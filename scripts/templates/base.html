<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI 财务助手{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
        .nav { background: #1e293b; border-bottom: 1px solid #334155; padding: 0 1rem; display: flex; gap: 0.5rem; overflow-x: auto; }
        .nav a { color: #94a3b8; text-decoration: none; padding: 0.75rem 1rem; font-size: 0.9rem; white-space: nowrap; border-bottom: 2px solid transparent; }
        .nav a:hover, .nav a.active { color: #38bdf8; border-bottom-color: #38bdf8; }
        .container { max-width: 900px; margin: 0 auto; padding: 1.5rem 1rem; }
        h1 { font-size: 1.5rem; margin-bottom: 0.25rem; }
        h2 { font-size: 1.1rem; color: #94a3b8; margin: 1.5rem 0 0.75rem; }
        .card { background: #1e293b; border-radius: 10px; padding: 1.25rem; margin-bottom: 1rem; }
        .stat-row { display: flex; gap: 1rem; flex-wrap: wrap; }
        .stat { flex: 1; min-width: 120px; text-align: center; padding: 0.75rem; background: #0f172a; border-radius: 8px; }
        .stat .val { font-size: 1.3rem; font-weight: 700; }
        .stat .lbl { font-size: 0.75rem; color: #64748b; margin-top: 0.25rem; }
        .green { color: #4ade80; } .red { color: #f87171; } .blue { color: #38bdf8; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { text-align: left; color: #64748b; padding: 0.5rem 0.25rem; border-bottom: 1px solid #334155; font-weight: 500; }
        td { padding: 0.5rem 0.25rem; border-bottom: 1px solid #1e293b; }
        .tag { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 4px; font-size: 0.7rem; font-weight: 600; }
        .tag-etf { background: #1e3a5f; color: #60a5fa; }
        .tag-stock { background: #3b1e1e; color: #f87171; }
        .tag-fund { background: #1e3b2f; color: #4ade80; }
        .report-item { padding: 0.6rem 0; border-bottom: 1px solid #1e293b; display: flex; justify-content: space-between; align-items: center; }
        .report-item:last-child { border: none; }
        .report-item .meta { font-size: 0.75rem; color: #64748b; }
        .bar-wrap { background: #0f172a; border-radius: 4px; height: 8px; margin-top: 0.5rem; overflow: hidden; }
        .bar { height: 100%; border-radius: 4px; }
        .bar-etf { background: #60a5fa; } .bar-stock { background: #f87171; } .bar-fund { background: #4ade80; } .bar-cash { background: #475569; }
        .chart-img { max-width: 100%; border-radius: 8px; }
        .empty { text-align: center; padding: 2rem; color: #64748b; }
        footer { text-align: center; padding: 1.5rem; color: #475569; font-size: 0.75rem; }
    </style>
</head>
<body>
    <nav class="nav">
        <a href="/" class="{% block nav_dashboard %}{% endblock %}">📊 总览</a>
        <a href="/history" class="{% block nav_history %}{% endblock %}">📈 历史</a>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <footer>AI 财务助手 · {{ now.strftime('%Y-%m-%d %H:%M') }}</footer>
</body>
</html>
